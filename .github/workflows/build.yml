name: Build and Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install nuitka

      - name: Build exe
        run: |
          python -m nuitka --onefile --windows-disable-console --output-filename=Chronicle.exe --include-package=mcp --include-package=fastmcp --include-package=uvicorn --include-package=starlette --include-package=pystray --include-package=pynput main.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: Chronicle.exe
