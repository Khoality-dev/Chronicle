name: Build and Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: |
          pyinstaller --onefile --windowed --name Chronicle --copy-metadata fastmcp --copy-metadata mcp --collect-submodules fastmcp --collect-submodules uvicorn --collect-submodules starlette --hidden-import mcp --hidden-import mcp.server --hidden-import mcp.server.sse --hidden-import mcp.types --hidden-import mcp.shared --exclude-module mcp.cli main.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Chronicle.exe
